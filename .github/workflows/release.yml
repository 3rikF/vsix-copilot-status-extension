name: Build and Release VSIX

on:
  push:
    tags:
      - 'v*' # triggers on tags like v1.0.0, v1.2.3, etc.

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v3

      - name: Restore NuGet Packages
        run: nuget restore CoPilotStatusExtension.slnx

      - name: Build VSIX
        run: msbuild CoPilotStatusExtension.slnx /p:Configuration=Release /p:DeployExtension=false /p:ZipPackageCompressionLevel=normal

      - name: Locate VSIX File
        id: find_vsix
        shell: powershell
        run: |
          # Recursively finds the generated .vsix file in the Release build output
          $vsixPath = Get-ChildItem -Path .\CoPilotStatusExtension\bin\Release -Filter *.vsix -Recurse | Select-Object -First 1 -ExpandProperty FullName

          if (-not $vsixPath) {
              Write-Error "VSIX file not found!"
              exit 1
          }

          echo "Found VSIX at: $vsixPath"
          echo "VSIX_PATH=$vsixPath" >> $env:GITHUB_ENV

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.VSIX_PATH }}
          generate_release_notes: true